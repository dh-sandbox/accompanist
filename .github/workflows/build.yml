name: Build & test

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest --continue --no-configuration-cache --stacktrace

      - name: Generate coverage reports
        run: ./gradlew createDebugUnitTestCoverageReport --continue --no-configuration-cache --stacktrace

      - name: Upload coverage to Qlty
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: "**/build/reports/coverage/test/debug/report.xml"
          format: jacoco
        env:
          JACOCO_SOURCE_PATH: adaptive/src/main/java

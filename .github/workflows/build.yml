name: Build & test

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'skip ci')"

    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Unit Tests with coverage
        run: ./gradlew :adaptive:testDebugUnitTest --no-configuration-cache --stacktrace

      - name: Debug coverage artifacts
        run: |
          echo "=== Exec file ==="
          find . -name "*.exec" -ls
          echo "=== Class directories ==="
          ls -la adaptive/build/tmp/kotlin-classes/debug/ 2>/dev/null || echo "kotlin-classes/debug not found"
          ls -la adaptive/build/intermediates/javac/debug/classes/ 2>/dev/null || echo "javac/debug/classes not found"
          find adaptive/build -type d -name "classes" -o -type d -name "kotlin-classes" 2>/dev/null | head -20

      - name: Generate coverage reports
        run: ./gradlew :adaptive:jacocoTestReport --no-configuration-cache --stacktrace

      - name: Upload coverage to Qlty
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: adaptive/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          format: jacoco
        env:
          JACOCO_SOURCE_PATH: adaptive/src/main/java
